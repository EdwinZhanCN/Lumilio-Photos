allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  msw: true
  # Web runs in the browser and uses onnxruntime-web (WASM); the onnxruntime-node
  # native binding is a transitive dep that is never used here, and its
  # postinstall downloads a large native binary over the network, which flakes
  # the CI install (ETIMEDOUT). Skip its build instead of downloading it.
  onnxruntime-node: false
  # protobufjs runs a local-only postinstall; sharp resolves the prebuilt
  # platform package from the lockfile (no heavy download). Both are safe to run.
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  - "@edwinzhancn/docts@0.1.0"

# Route transitive Vite/Vitest consumers through the Vite+ alpha packages.
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vitest: 4.1.10
  vite-plus: 0.2.5
  '@vitest/browser-playwright': 4.1.10
  '@vitest/coverage-istanbul': 4.1.10
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
