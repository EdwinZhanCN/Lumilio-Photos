server {
    listen 80;
    server_name localhost;

    # Root directory where your built files are located
    root /usr/share/nginx/html;
    index index.html;

    # Set proper MIME types
    include /etc/nginx/mime.types;

    # Allow large media uploads through reverse proxy.
    client_max_body_size 0;

    # Proxy API requests to backend service to keep browser requests same-origin.
    location /api/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Handle all requests with intelligent fallback.
    # Do not try `$uri/`: Vite emits a real `/assets/` directory, which would
    # make the React `/assets/` route hit nginx's directory listing and 403.
    location / {
        # Try to serve the file directly
        # If it does not exist, serve index.html for React Router.
        try_files $uri /index.html;
    }

    # Serve JavaScript files with correct content type
    location ~* \.js$ {
        add_header Content-Type application/javascript;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve CSS files with correct content type
    location ~* \.css$ {
        add_header Content-Type text/css;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle WASM files properly
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Cache static assets (images, fonts, etc.)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/wasm;
}
