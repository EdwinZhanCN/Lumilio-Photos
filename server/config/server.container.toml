# Complete container runtime manifest. No Lumilio server environment variable
# overrides are applied. Secret values live only in the referenced files.
schema_version = 1
environment = "production"

[database]
host = "db"
port = "5432"
user = "postgres"
name = "lumiliophotos"
ssl = "disable"
bootstrap_password_file = "/run/secrets/db_bootstrap_password"
rotated_password_file = "/data/storage/.secrets/db_password"
tools_bin_dir = ""

[server]
port = "6680"
cors_allowed_origins = ["http://localhost:6657", "https://localhost:6657"]
web_root = ""

[logging]
level = "info"
dir = "/app/logs"
console_format = "console"
file_format = "json"
repository_audit_verbose = false

[storage]
path = "/data/storage"

[repository_scan]
enabled = true
interval_seconds = 300
settle_seconds = 5
max_concurrent_repos = 1
batch_size = 500

[geocoding]
provider = "disabled"
nominatim_endpoint = "https://nominatim.openstreetmap.org/reverse"
language = "en"
user_agent = "Lumilio-Photos/1.0"

[auth]
secret_key_file = "/data/storage/.secrets/lumilio_secret_key"
access_token_ttl = "15m"
refresh_token_ttl = "168h"
media_token_ttl = "10m"
webauthn_rp_name = "Lumilio Photos"
webauthn_rp_mode = "origin-derived"
webauthn_rp_id = ""
webauthn_rp_origins = []

[transcode]
hardware_accel = "none"

[lumen]
discovery_enabled = false
discovery_mdns_enabled = false
discovery_hub_url = ""
discovery_static_nodes = []
discovery_service_type = "_lumen._tcp"
discovery_domain = "local"
deployment_id = "container"
resolve_timeout = "3s"
connect_timeout = "3s"
rediscovery_backoff_min = "10s"
rediscovery_backoff_max = "2m"
scan_interval = "30s"
chunk_auto = true
chunk_threshold_bytes = 1048576
chunk_max_bytes = 262144

[tools]
exiftool_path = "exiftool"
ffmpeg_path = "ffmpeg"
ffprobe_path = "ffprobe"
