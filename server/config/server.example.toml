# Complete schema v1 runtime manifest. Copy to server.local.toml and edit it.
# There are no code defaults, file search, or environment-variable overrides.
# Relative paths are resolved from this TOML file's directory.
schema_version = 1
environment = "development"

[database]
host = "localhost"
port = "5433"
user = "postgres"
name = "lumiliophotos"
ssl = "disable"
# Bootstrap must exist and be non-empty. Rotated may be absent before setup.
bootstrap_password_file = ".secrets/db_bootstrap_password"
rotated_password_file = "../data/app-state/secrets/db_password"
# Empty means find version-matched PostgreSQL tools automatically.
tools_bin_dir = ""

[server]
port = "6680"
# An empty array disables cross-origin access.
cors_allowed_origins = ["http://localhost:6657", "https://localhost:6657"]
# Empty serves API only; otherwise this is the SPA root.
web_root = ""

[logging]
level = "debug"
dir = "../logs"
console_format = "console"
file_format = "json"
repository_audit_verbose = false

[storage]
# Portable media root. Machine-bound state below must live elsewhere.
path = "../data/storage"
cloud_state_path = "../data/app-state/cloud"
# Explicit destination; Desktop defaults this to local app data.
backups_path = "../data/app-state/backups"

[repository_scan]
enabled = true
interval_seconds = 300
settle_seconds = 5
max_concurrent_repos = 1
batch_size = 500

[geocoding]
provider = "disabled"
nominatim_endpoint = "https://nominatim.openstreetmap.org/reverse"
language = "zh"
user_agent = "Lumilio-Photos/1.0"

[auth]
# May be absent on first boot; the server creates it with mode 0600.
secret_key_file = "../data/app-state/secrets/lumilio_secret_key"
access_token_ttl = "15m"
refresh_token_ttl = "168h"
media_token_ttl = "10m"
webauthn_rp_name = "Lumilio Photos"
# origin-derived requires the next two values to remain explicitly empty.
webauthn_rp_mode = "origin-derived"
webauthn_rp_id = ""
webauthn_rp_origins = []

[transcode]
hardware_accel = "auto"

[lumen]
discovery_enabled = true
discovery_mdns_enabled = true
# Hub URL and static nodes may both be empty when mDNS is enabled.
discovery_hub_url = ""
discovery_static_nodes = []
discovery_service_type = "_lumen._tcp"
discovery_domain = "local"
deployment_id = "local"
resolve_timeout = "3s"
connect_timeout = "3s"
rediscovery_backoff_min = "10s"
rediscovery_backoff_max = "2m"
scan_interval = "30s"
chunk_auto = true
chunk_threshold_bytes = 1048576
chunk_max_bytes = 262144

[tools]
# Bare commands use PATH lookup; paths containing a separator are manifest-relative.
exiftool_path = "exiftool"
ffmpeg_path = "ffmpeg"
ffprobe_path = "ffprobe"
