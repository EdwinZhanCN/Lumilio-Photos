# Lumilio Photos server runtime configuration template.
#
# `make setup` copies this file to `server.local.toml` when the local file does
# not exist. Edit `server.local.toml`; keep this example generic and safe.
#
# Boundary:
# - TOML describes stable application behavior.
# - Environment variables describe bootstrap, deployment wiring, machine-local
#   addresses, and secrets.
# - Secret values should not be committed to TOML. Prefer env, secret files, or
#   a platform secret manager.

# Runtime profile. `SERVER_ENV` is the preferred bootstrap selector and wins
# when set by the process environment. Keep this commented unless you are
# intentionally pinning a local config copy.
# environment = "development"

[server]
# HTTP listen port for the API server.
# Env override: SERVER_PORT.
port = "6680"

# Process-facing log level. Values: debug, info, warn, error.
# Env override: SERVER_LOG_LEVEL.
log_level = "debug"

# Browser origins allowed by CORS.
# Env override: SERVER_CORS_ALLOWED_ORIGINS as a comma-separated list.
cors_allowed_origins = ["http://localhost:6657", "https://localhost:6657"]

# Optional SPA root. Empty means API-only; docker/web normally serves the SPA
# separately, while desktop injects a bundled web root through typed config.
# Env override: SERVER_WEB_ROOT.
web_root = ""

[logging]
# Main logging level. Usually mirrors server.log_level.
# Env override: LOG_LEVEL.
level = "debug"

# Directory for log files. Deployment wrappers may inject an absolute path.
# Env override: LOG_DIR.
dir = "logs"

# Values: console, json.
# Env overrides: LOG_FORMAT_CONSOLE, LOG_FORMAT_FILE.
console_format = "console"
file_format = "json"

# Set a non-empty value to emit verbose repository audit traces.
# Env override: REPO_AUDIT_VERBOSE.
repository_audit_verbose = ""

# Database connection settings are intentionally not declared here.
# They are deployment wiring, not stable application behavior. Inject them with:
#
#   DB_HOST
#   DB_PORT
#   DB_USER
#   DB_PASSWORD
#   DB_NAME
#   DB_SSL
#   DB_PASSWORD_FILE or LUMILIO_DB_PASSWORD_FILE
#
# The runtime still has conservative fallback defaults for local/docker boot,
# but real deployments should supply database wiring from the process
# environment or a supervisor.

[storage]
# The single immutable storage root. This is the only path Lumilio reads and
# writes (non-desktop). Well-known subdirectories are derived by convention and
# are NOT configurable: <path>/primary (primary repo), <path>/.secrets
# (db_password, app secret key), <path>/.cloud (cloud sync). Additional
# repositories live under <path>/<name>. Set this once; changing it requires a
# restart and re-setup.
# Env override: STORAGE_PATH.
path = "./data/storage"

# NOTE: repository behaviour (strategy / preserve_filename / duplicate_handling)
# is a runtime-MUTABLE setting stored in the database, not here. It is seeded
# from program defaults on first run and changed via the Settings/Setup API.

[repository_scan]
# Periodically scan repositories for filesystem changes.
# Env override: REPOSITORY_SCAN_ENABLED.
enabled = true

# Scan cadence and batching.
# Env overrides:
# REPOSITORY_SCAN_INTERVAL_SECONDS, REPOSITORY_SCAN_SETTLE_SECONDS,
# REPOSITORY_SCAN_MAX_CONCURRENT_REPOS, REPOSITORY_SCAN_BATCH_SIZE.
interval_seconds = 300
settle_seconds = 5
max_concurrent_repos = 1
batch_size = 500

[geocoding]
# Reverse geocoding provider for location cluster labels. Values:
# disabled, nominatim.
# Env override: GEOCODING_PROVIDER.
provider = "disabled"

# Used only when provider = "nominatim". For anything beyond light personal
# testing, configure a compliant endpoint.
# Env override: GEOCODING_NOMINATIM_ENDPOINT.
nominatim_endpoint = "https://nominatim.openstreetmap.org/reverse"

# Preferred language for returned place names, for example: en, zh.
# Env override: GEOCODING_LANGUAGE.
language = "zh"

# Public Nominatim requires a useful User-Agent.
# Env override: GEOCODING_USER_AGENT.
user_agent = "Lumilio-Photos/1.0"

# NOTE: ML task toggles ([ml]) and LLM/agent settings ([llm]) are runtime-MUTABLE
# settings stored in the database. They are seeded from program defaults on first
# run (ML enabled in production, disabled in development) and changed via the
# Settings/Setup API — not configurable in TOML.

[auth]
# Path to the app root secret. This is a reference, not raw key material. Leave
# empty to let the runtime derive/create the key under the storage secret area,
# or inject a host-specific path with LUMILIO_SECRET_KEY.
# Env override: LUMILIO_SECRET_KEY.
secret_key_path = ""

# Go duration strings.
# Env overrides: ACCESS_TOKEN_TTL, REFRESH_TOKEN_TTL, MEDIA_TOKEN_TTL.
access_token_ttl = "15m"
refresh_token_ttl = "168h"
media_token_ttl = "10m"

# WebAuthn/passkey relying party settings. For localhost development, leaving
# rp_id/origins empty lets the runtime derive safe defaults. For a real domain,
# set rp_id to the domain and origins to the exact browser origins.
# Env overrides: WEBAUTHN_RP_NAME, WEBAUTHN_RP_ID, WEBAUTHN_RP_ORIGINS.
webauthn_rp_name = "Lumilio Photos"
webauthn_rp_id = ""
webauthn_rp_origins = []

[transcode]
# Video transcoding acceleration. Values: auto, vaapi, nvenc, qsv, none.
# Env override: TRANSCODE_HW_ACCEL.
hardware_accel = "auto"

[lumen]
# Lumen discovery is used for optional local ML service discovery.
# Env overrides: LUMEN_DISCOVERY_ENABLED, LUMEN_DISCOVERY_MDNS_ENABLED,
# LUMEN_DISCOVERY_HUB_URL.
# Set discovery_enabled = false (or leave mDNS off with no hub URL) to run
# without external ML; the server boots and media management still works.
discovery_enabled = true

# mDNS is useful on desktop/local networks; disable in container environments
# when host networking is unavailable or a hub URL is used instead.
discovery_mdns_enabled = true

# Optional Lumen hub URL. Container setups commonly inject this from env.
discovery_hub_url = ""

# Pinned Lumen node endpoints ("host:port"), used without dynamic discovery.
# Works everywhere mDNS cannot (bridge-network containers, firewalled LANs,
# fixed-IP NAS). Backends are additive: mDNS, hub URL, and static nodes all
# run when configured. Env override: LUMEN_DISCOVERY_STATIC_NODES
# (comma-separated).
discovery_static_nodes = []

[tools]
# Absolute paths to external media tools. Empty means resolve via PATH. Desktop
# injects bundled paths through typed config; containers normally use PATH.
# Env overrides: EXIFTOOL_PATH, FFMPEG_PATH, FFPROBE_PATH.
exiftool_path = ""
ffmpeg_path = ""
ffprobe_path = ""
