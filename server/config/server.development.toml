environment = "development"

[server]
port = "6680"
log_level = "debug"
cors_allowed_origins = ["http://localhost:6657", "https://localhost:6657"]

[logging]
level = "debug"
dir = "logs"
console_format = "console"
file_format = "json"
repository_audit_verbose = ""

[database]
host = "localhost"
port = "5433"
user = "postgres"
password = "postgres"
name = "lumiliophotos"
ssl = "disable"

[storage]
path = "./data/storage"
strategy = "date"
preserve_filename = true
duplicate_handling = "rename"

[repository_scan]
enabled = false
interval_seconds = 300
settle_seconds = 5
max_concurrent_repos = 1
batch_size = 500

[geocoding]
provider = "disabled"
nominatim_endpoint = ""
language = "en"
user_agent = "Lumilio-Photos/1.0"
naturalearth_city_radius_meters = 50000

[ml]
clip_enabled = false
bioclip_enabled = false
ocr_enabled = false
face_enabled = false

[llm]
agent_enabled = false
provider = ""
api_key = ""
model_name = ""
base_url = ""

[auth]
secret_key_path = "./data/storage/.secrets/lumilio_secret_key"
access_token_ttl = "15m"
refresh_token_ttl = "168h"
media_token_ttl = "10m"
webauthn_rp_name = "Lumilio Photos"
webauthn_rp_id = ""
webauthn_rp_origins = []

[transcode]
hardware_accel = "auto"

[lumen]
discovery_enabled = true
discovery_mdns_enabled = false
discovery_hub_url = ""
connection_insecure = true
