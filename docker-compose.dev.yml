services:
    db:
        build:
            context: .
            dockerfile: server/db.Dockerfile
        image: lumilio-db:latest
        restart: unless-stopped
        environment:
            POSTGRES_DB: lumiliophotos
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d lumiliophotos"]
            interval: 10s
            timeout: 5s
            retries: 5

    naturalearth-import:
        build:
            context: .
            dockerfile: server/geodata.Dockerfile
        image: lumilio-geodata-import:latest
        profiles:
            - geodata
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGHOST: db
            PGPORT: 5432
            PGDATABASE: lumiliophotos
            PGUSER: postgres
            PGPASSWORD: postgres
        volumes:
            - naturalearth_data:/data/naturalearth
            - ./server/scripts/import-natural-earth.sh:/import-natural-earth.sh:ro
        command: ["/bin/bash", "/import-natural-earth.sh"]

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        depends_on:
            db:
                condition: service_healthy
        environment:
            SERVER_PORT: 8080
            SERVER_ENV: development
            SERVER_LOG_LEVEL: debug
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: postgres
            DB_PASSWORD: postgres
            DB_NAME: lumiliophotos
            DB_SSL: disable
            STORAGE_PATH: /data/storage
            STORAGE_STRATEGY: date
            STORAGE_PRESERVE_FILENAME: "true"
            STORAGE_DUPLICATE_HANDLING: rename
            REPOSITORY_SCAN_ENABLED: "true"
            REPOSITORY_SCAN_INTERVAL_SECONDS: "300"
            REPOSITORY_SCAN_SETTLE_SECONDS: "5"
            REPOSITORY_SCAN_MAX_CONCURRENT_REPOS: "1"
            REPOSITORY_SCAN_BATCH_SIZE: "500"
            GEOCODING_PROVIDER: disabled
            GEOCODING_NOMINATIM_ENDPOINT: ""
            GEOCODING_LANGUAGE: en
            GEOCODING_USER_AGENT: Lumilio-Photos/1.0
            GEOCODING_NATURALEARTH_CITY_RADIUS_METERS: "50000"
            ML_CLIP_ENABLED: "false"
            ML_BIOCLIP_ENABLED: "false"
            ML_OCR_ENABLED: "false"
            ML_CAPTION_ENABLED: "false"
            ML_FACE_ENABLED: "false"
            LUMILIO_SECRET_KEY: /data/storage/.secrets/lumilio_secret_key
            LLM_AGENT_ENABLED: "false"
            LLM_PROVIDER: your-llm-provider
            LLM_API_KEY: your-api-key-here
            LLM_MODEL_NAME: your-model-name
            LLM_BASE_URL: your-openai-compatiable-base-url
            TRANSCODE_HW_ACCEL: auto
        devices:
            - /dev/dri:/dev/dri
        volumes:
            - server_storage:/data/storage
        ports:
            - "8080:8080"

    web:
        build:
            context: .
            dockerfile: web/Dockerfile
            args:
                VITE_PLUGIN_REGISTRY_URL: ${VITE_PLUGIN_REGISTRY_URL:-https://registry.lumilio.org}
                VITE_PLUGIN_CDN_ORIGIN: ${VITE_PLUGIN_CDN_ORIGIN:-https://cdn.lumilio.org}
                VITE_STUDIO_PLUGIN_RUNTIME_ENABLED: ${VITE_STUDIO_PLUGIN_RUNTIME_ENABLED:-true}
        depends_on:
            - server
        environment:
            API_URL: ""
        ports:
            - "6680:80"
            - "6657:443"

volumes:
    db_data:
    naturalearth_data:
    server_storage:
