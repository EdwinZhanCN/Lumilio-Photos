services:
    db:
        build:
            context: .
            dockerfile: server/db.Dockerfile
        image: lumilio-db:latest
        restart: unless-stopped
        environment:
            POSTGRES_DB: lumiliophotos
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        command:
            - postgres
            - -c
            - maintenance_work_mem=256MB
            - -c
            - max_parallel_maintenance_workers=4
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d lumiliophotos"]
            interval: 10s
            timeout: 5s
            retries: 5

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        depends_on:
            db:
                condition: service_healthy
        environment:
            SERVER_PORT: 6680
            SERVER_ENV: development
            SERVER_LOG_LEVEL: debug
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: postgres
            DB_PASSWORD: postgres
            DB_NAME: lumiliophotos
            DB_SSL: disable
            STORAGE_PATH: /data/storage
            STORAGE_STRATEGY: date
            STORAGE_PRESERVE_FILENAME: "true"
            STORAGE_DUPLICATE_HANDLING: rename
            REPOSITORY_SCAN_ENABLED: "true"
            REPOSITORY_SCAN_INTERVAL_SECONDS: "300"
            REPOSITORY_SCAN_SETTLE_SECONDS: "5"
            REPOSITORY_SCAN_MAX_CONCURRENT_REPOS: "1"
            REPOSITORY_SCAN_BATCH_SIZE: "500"
            GEOCODING_PROVIDER: disabled
            GEOCODING_NOMINATIM_ENDPOINT: ""
            GEOCODING_LANGUAGE: en
            GEOCODING_USER_AGENT: Lumilio-Photos/1.0
            GEOCODING_NATURALEARTH_CITY_RADIUS_METERS: "50000"
            ML_CLIP_ENABLED: ${ML_CLIP_ENABLED:-false}
            ML_BIOCLIP_ENABLED: ${ML_BIOCLIP_ENABLED:-false}
            ML_OCR_ENABLED: ${ML_OCR_ENABLED:-false}
            ML_FACE_ENABLED: ${ML_FACE_ENABLED:-false}
            LUMEN_DISCOVERY_ENABLED: ${LUMEN_DISCOVERY_ENABLED:-true}
            LUMEN_DISCOVERY_MDNS_ENABLED: ${LUMEN_DISCOVERY_MDNS_ENABLED:-false}
            LUMEN_DISCOVERY_HUB_URL: ${LUMEN_DISCOVERY_HUB_URL:-http://host.docker.internal:5866}
            LUMEN_CONNECTION_INSECURE: ${LUMEN_CONNECTION_INSECURE:-true}
            LUMILIO_SECRET_KEY: /data/storage/.secrets/lumilio_secret_key
            LLM_AGENT_ENABLED: "false"
            LLM_PROVIDER: your-llm-provider
            LLM_API_KEY: your-api-key-here
            LLM_MODEL_NAME: your-model-name
            LLM_BASE_URL: your-openai-compatiable-base-url
            TRANSCODE_HW_ACCEL: auto
        # Uncomment below to enable hardware-accelerated transcoding (Intel/AMD GPU):
        # devices:
        #     - /dev/dri:/dev/dri
        # For NVIDIA GPU, use the following instead + nvidia-container-toolkit:
        # deploy:
        #     resources:
        #         reservations:
        #             devices:
        #                 - driver: nvidia
        #                   count: 1
        #                   capabilities: [gpu]
        volumes:
            # Replace /PATH/TO/YOUR/ASSETS with your host storage root directory.
            - /PATH/TO/YOUR/ASSETS:/data/storage
        ports:
            - "6680:6680"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:6680/api/v1/health >/dev/null"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    web:
        build:
            context: .
            dockerfile: web/Dockerfile
            args:
                VITE_PLUGIN_REGISTRY_URL: ${VITE_PLUGIN_REGISTRY_URL:-https://registry.lumilio.org}
                VITE_PLUGIN_CDN_ORIGIN: ${VITE_PLUGIN_CDN_ORIGIN:-https://cdn.lumilio.org}
                VITE_STUDIO_PLUGIN_RUNTIME_ENABLED: ${VITE_STUDIO_PLUGIN_RUNTIME_ENABLED:-true}
        depends_on:
            server:
                condition: service_healthy
        environment:
            API_URL: ""
        ports:
            - "6657:80"

volumes:
    db_data:
