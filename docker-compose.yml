services:
    db:
        build:
            context: .
            dockerfile: server/db.Dockerfile
        image: lumilio-db:latest
        restart: unless-stopped
        environment:
            POSTGRES_DB: lumiliophotos
            POSTGRES_USER: postgres
            # Temporary bootstrap credential. The first-run web setup wizard
            # generates a high-entropy password and rotates this role via
            # ALTER USER; the new secret is persisted under the mounted storage
            # volume (.secrets/db_password) and used on every subsequent boot.
            POSTGRES_PASSWORD: postgres
        # Database ingress is reachable on the internal application network as
        # `db:5432`. The host port mapping below is optional and only needed for
        # external tooling; comment it out to keep the database fully internal.
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        command:
            - postgres
            - -c
            - maintenance_work_mem=256MB
            - -c
            - max_parallel_maintenance_workers=4
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d lumiliophotos"]
            interval: 10s
            timeout: 5s
            retries: 5

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        depends_on:
            db:
                condition: service_healthy
        environment:
            SERVER_CONFIG_FILE: /app/config/server.toml
            SERVER_PORT: 6680
            SERVER_ENV: production
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: postgres
            # Temporary bootstrap password used only until first-run setup
            # rotates the credential. Once database.password_file exists, the
            # rotated secret on disk takes precedence over this value.
            DB_PASSWORD: postgres
            DB_NAME: lumiliophotos
            DB_SSL: disable
            # Optional override for server.toml [database].password_file.
            # Lives under the mounted storage volume so it persists alongside
            # the user's media and survives container/volume recreation.
            LUMILIO_DB_PASSWORD_FILE: /data/storage/.secrets/db_password
            ML_CLIP_ENABLED: ${ML_CLIP_ENABLED:-false}
            ML_BIOCLIP_ENABLED: ${ML_BIOCLIP_ENABLED:-false}
            ML_OCR_ENABLED: ${ML_OCR_ENABLED:-false}
            ML_FACE_ENABLED: ${ML_FACE_ENABLED:-false}
            LUMILIO_SECRET_KEY: /data/storage/.secrets/lumilio_secret_key
        # Uncomment below to enable hardware-accelerated transcoding (Intel/AMD GPU):
        # devices:
        #     - /dev/dri:/dev/dri
        # For NVIDIA GPU, use the following instead + nvidia-container-toolkit:
        # deploy:
        #     resources:
        #         reservations:
        #             devices:
        #                 - driver: nvidia
        #                   count: 1
        #                   capabilities: [gpu]
        volumes:
            # Replace /PATH/TO/YOUR/ASSETS with your host storage root directory.
            # This is the only mounted volume: media, the rotated DB secret
            # (.secrets/db_password), and the server secret key all live here.
            - /PATH/TO/YOUR/ASSETS:/data/storage
        ports:
            - "6680:6680"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:6680/api/v1/health >/dev/null"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    web:
        build:
            context: .
            dockerfile: web/Dockerfile
            args:
                VITE_PLUGIN_REGISTRY_URL: ${VITE_PLUGIN_REGISTRY_URL:-https://registry.lumilio.org}
                VITE_PLUGIN_CDN_ORIGIN: ${VITE_PLUGIN_CDN_ORIGIN:-https://cdn.lumilio.org}
                VITE_STUDIO_PLUGIN_RUNTIME_ENABLED: ${VITE_STUDIO_PLUGIN_RUNTIME_ENABLED:-true}
        depends_on:
            server:
                condition: service_healthy
        environment:
            API_URL: ""
            LUMILIO_SITE_ADDRESS: ${LUMILIO_SITE_ADDRESS:-:80}
            LUMILIO_API_UPSTREAM: ${LUMILIO_API_UPSTREAM:-h2c://server:6680}
        ports:
            - "${WEB_HTTP_PORT:-6657}:80"
            - "${WEB_HTTPS_PORT:-6658}:443"
            - "${WEB_HTTPS_PORT:-6658}:443/udp"

volumes:
    db_data:
