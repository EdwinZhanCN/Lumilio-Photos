services:
    db:
        build:
            context: .
            dockerfile: server/db.Dockerfile
        image: lumilio-db:latest
        restart: unless-stopped
        environment:
            POSTGRES_DB: lumiliophotos
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD_FILE: /run/secrets/db_bootstrap_password
        secrets:
            - db_bootstrap_password
        # Database ingress is reachable on the internal application network as
        # `db:5432`. The host port mapping below is optional and only needed for
        # external tooling; comment it out to keep the database fully internal.
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql
        command:
            - postgres
            - -c
            - maintenance_work_mem=256MB
            - -c
            - max_parallel_maintenance_workers=4
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d lumiliophotos"]
            interval: 10s
            timeout: 5s
            retries: 5

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        depends_on:
            db:
                condition: service_healthy
        secrets:
            - db_bootstrap_password
        # Uncomment below to enable hardware-accelerated transcoding (Intel/AMD GPU):
        # devices:
        #     - /dev/dri:/dev/dri
        # For NVIDIA GPU, use the following instead + nvidia-container-toolkit:
        # deploy:
        #     resources:
        #         reservations:
        #             devices:
        #                 - driver: nvidia
        #                   count: 1
        #                   capabilities: [gpu]
        volumes:
            # Replace /PATH/TO/YOUR/ASSETS with your host storage root directory.
            - /PATH/TO/YOUR/ASSETS:/data/storage
            # Machine-bound cloud sessions, secrets, and database backups stay
            # separate from the portable media root.
            - app_state:/data/app-state
        ports:
            - "6680:6680"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:6680/api/v1/health >/dev/null"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    web:
        build:
            context: .
            dockerfile: web/Dockerfile
        depends_on:
            server:
                condition: service_healthy
        environment:
            API_URL: ""
            LUMILIO_SITE_ADDRESS: ${LUMILIO_SITE_ADDRESS:-:80}
            LUMILIO_API_UPSTREAM: ${LUMILIO_API_UPSTREAM:-http://server:6680}
        ports:
            - "${WEB_HTTP_PORT:-6657}:80"
            - "${WEB_HTTPS_PORT:-6658}:443"
            - "${WEB_HTTPS_PORT:-6658}:443/udp"

volumes:
    db_data:
    app_state:

secrets:
    db_bootstrap_password:
        file: ./server/config/.secrets/db_bootstrap_password
