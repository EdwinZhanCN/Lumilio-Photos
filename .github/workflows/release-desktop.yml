name: Release Desktop

# Builds the desktop distributions on version tags and attaches them to the
# GitHub Release:
#   - macOS (Apple Silicon): ad-hoc-signed DMG via build-macos.sh
#   - Windows (amd64): portable zip via build-windows.sh (MSYS2/mingw64 CGo)
# A fresh relocatable PostgreSQL is built per platform by the called
# build-postgres workflow, and one shared web SPA artifact feeds both bundles.
#
# macOS amd64 is deferred until fetch-resources.sh gains Intel ffmpeg pins
# (then: matrix entry runner macos-15-intel, artifact postgres-darwin-amd64).

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    postgres:
        uses: ./.github/workflows/build-postgres.yml

    spa:
        name: web SPA
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v7

            - name: Enable pnpm via corepack
              run: corepack enable

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: web/pnpm-lock.yaml

            - uses: actions/setup-go@v6
              with:
                  go-version-file: desktop/go.mod
                  cache-dependency-path: |
                      desktop/go.sum
                      server/go.sum

            - name: Install Vite+
              run: |
                  curl -fsSL https://vite.plus | bash
                  echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

            # @edwinzhancn/docts resolves from GitHub Packages (token required).
            - name: Authenticate GitHub Packages
              run: echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build web SPA
              run: |
                  cd web && vp install && vp build
                  cd .. && node desktop/scripts/generate-third-party-notices.mjs

            - uses: actions/upload-artifact@v7
              with:
                  name: web-dist
                  path: web/dist
                  if-no-files-found: error
                  retention-days: 1

            - uses: actions/upload-artifact@v7
              with:
                  name: third-party-notices
                  path: desktop/licenses/THIRD_PARTY_NOTICES.txt
                  if-no-files-found: error
                  retention-days: 1

    dmg:
        name: dmg (${{ matrix.arch }})
        needs: [postgres, spa]
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: arm64
                      runner: macos-15
        steps:
            - uses: actions/checkout@v7

            - name: Install build dependencies
              run: brew install vips libraw dylibbundler create-dmg

            # cgo bakes versioned Homebrew Cellar paths
            # (-L/opt/homebrew/Cellar/vips/<ver>/lib) into cached Go build
            # artifacts. With a cache keyed only on go.sum, a runner-image brew
            # bump restores objects that link against Cellar paths that no
            # longer exist ("ld: library 'vips' not found"), so the native
            # dependency versions must participate in the cache key.
            - name: Record native dep versions for the Go cache key
              run: |
                  brew list --versions vips libraw $(brew deps vips libraw) \
                      | sort > .brew-go-cache-key
                  cat .brew-go-cache-key

            - uses: actions/setup-go@v6
              with:
                  go-version-file: desktop/go.mod
                  cache-dependency-path: |
                      desktop/go.sum
                      server/go.sum
                      .brew-go-cache-key

            - name: Stage web SPA
              uses: actions/download-artifact@v8
              with:
                  name: web-dist
                  path: web/dist

            - name: Stage third-party notices
              uses: actions/download-artifact@v8
              with:
                  name: third-party-notices
                  path: desktop/licenses

            - name: Stage PostgreSQL bundle
              uses: actions/download-artifact@v8
              with:
                  name: postgres-darwin-${{ matrix.arch }}
                  path: desktop/resources/postgres

            - name: Stage media tools (ffmpeg/ffprobe/exiftool)
              run: desktop/scripts/fetch-resources.sh

            # github.ref_name is a tag on releases but a branch on manual
            # dispatch, and branch names may contain '/' — which turns the
            # artifact filename into a nonexistent directory. Sanitize once.
            - name: Compute artifact-safe ref name
              run: echo "SAFE_REF=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

            - name: Build .app and DMG
              run: |
                  LUMILIO_VERSION="${SAFE_REF#v}" LUMILIO_WEB_DIST_PREBUILT=1 \
                      desktop/scripts/build-macos.sh ${{ matrix.arch }} --dmg

            - name: Rename DMG for release
              run: |
                  mv "desktop/build/Lumilio-Photos-${{ matrix.arch }}.dmg" \
                     "desktop/build/Lumilio-Photos-${SAFE_REF}-macos-${{ matrix.arch }}.dmg"

            - uses: actions/upload-artifact@v7
              with:
                  name: dmg-${{ matrix.arch }}
                  path: desktop/build/Lumilio-Photos-*-macos-${{ matrix.arch }}.dmg
                  if-no-files-found: error

    windows:
        name: windows (amd64)
        needs: [postgres, spa]
        runs-on: windows-2025
        steps:
            - uses: actions/checkout@v7

            - uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: false
                  install: >-
                      git
                      zip
                      mingw-w64-x86_64-go
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-pkgconf
                      mingw-w64-x86_64-libvips
                      mingw-w64-x86_64-libraw
                      mingw-w64-x86_64-ntldd

            - name: Stage web SPA
              uses: actions/download-artifact@v8
              with:
                  name: web-dist
                  path: web/dist

            - name: Stage third-party notices
              uses: actions/download-artifact@v8
              with:
                  name: third-party-notices
                  path: desktop/licenses

            - name: Stage PostgreSQL bundle
              uses: actions/download-artifact@v8
              with:
                  name: postgres-windows-amd64
                  path: desktop/resources/postgres

            - name: Stage media tools (ffmpeg/ffprobe/exiftool)
              shell: pwsh
              run: desktop/scripts/fetch-resources.ps1

            # Branch names from manual dispatch may contain '/', which would
            # turn artifact filenames into nonexistent directories (see the
            # matching step in the dmg job).
            - name: Compute artifact-safe ref name
              shell: bash
              run: echo "SAFE_REF=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

            - name: Build portable app directory
              shell: msys2 {0}
              env:
                  LUMILIO_TAG: ${{ env.SAFE_REF }}
              run: |
                  export GOFLAGS=-buildvcs=false
                  LUMILIO_VERSION="${LUMILIO_TAG#v}" desktop/scripts/build-windows.sh

            - name: Zip portable app
              shell: pwsh
              run: |
                  Compress-Archive -Path "desktop/build/windows/Lumilio Photos" `
                      -DestinationPath "desktop/build/Lumilio-Photos-${{ env.SAFE_REF }}-windows-amd64.zip"

            - name: Build installer (Inno Setup)
              shell: pwsh
              env:
                  LUMILIO_TAG: ${{ env.SAFE_REF }}
              run: |
                  $ver = "${env:LUMILIO_TAG}".TrimStart('v')
                  choco install innosetup --no-progress -y
                  $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
                  & "$iscc" "/DAppVersion=$ver" "desktop/packaging/windows/lumilio.iss"
                  if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

            # Two separate artifacts so neither download wraps the other: the
            # installer and the portable zip are parallel, independent downloads.
            - uses: actions/upload-artifact@v7
              with:
                  name: windows-amd64-setup
                  path: desktop/build/Lumilio-Photos-*-windows-amd64-setup.exe
                  if-no-files-found: error

            - uses: actions/upload-artifact@v7
              with:
                  name: windows-amd64
                  path: desktop/build/Lumilio-Photos-*-windows-amd64.zip
                  if-no-files-found: error

    release:
        name: Attach to GitHub Release
        runs-on: ubuntu-24.04
        needs: [dmg, windows]
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
        steps:
            - name: Download desktop artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: "{dmg-*,windows-amd64,windows-amd64-setup}"
                  path: dist
                  merge-multiple: true

            - uses: softprops/action-gh-release@v3
              with:
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  fail_on_unmatched_files: true
                  files: |
                      dist/Lumilio-Photos-*.dmg
                      dist/Lumilio-Photos-*-windows-amd64-setup.exe
                      dist/Lumilio-Photos-*.zip
                  body: |
                      ## macOS Desktop (Apple Silicon)

                      1. Download `Lumilio-Photos-${{ github.ref_name }}-macos-arm64.dmg` and drag the app into **Applications**.
                      2. First launch: the app is ad-hoc signed (not notarized), so approve it once via **System Settings → Privacy & Security → Open Anyway**.
                      3. Allow the **local network** prompt so Lumen ML servers can be discovered over mDNS (optional — the app works without ML).

                      ## Windows Desktop (x64)

                      **Installer (recommended):** download `Lumilio-Photos-${{ github.ref_name }}-windows-amd64-setup.exe` and run it.
                      It installs per-user (no admin), ensures the Edge WebView2 Runtime, and adds Start Menu + uninstaller entries.
                      SmartScreen may warn on the unsigned installer — choose **More info → Run anyway**.

                      **Portable (zip):** download `Lumilio-Photos-${{ github.ref_name }}-windows-amd64.zip`, extract anywhere, and run `Lumilio Photos\lumilio-photos.exe`.
                      Requires the Edge WebView2 Runtime to be present for the first-run setup window.

                      On first launch, allow the Windows Firewall prompt if you want LAN Lumen ML discovery (optional).

                      Linux/Docker images: `ghcr.io/edwinzhancn/lumilio-{server,web,db}` — see `docker-compose.release.yml`.
