name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Detect which subtrees changed so each gate only runs when relevant.
    changes:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            server: ${{ steps.filter.outputs.server }}
            web: ${{ steps.filter.outputs.web }}
            desktop: ${{ steps.filter.outputs.desktop }}
            site: ${{ steps.filter.outputs.site }}
        steps:
            - uses: actions/checkout@v7
            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      server:
                          - 'server/**'
                          - 'Makefile'
                          - '.github/workflows/ci.yml'
                      web:
                          - 'web/**'
                          - 'Makefile'
                          - '.github/workflows/ci.yml'
                      desktop:
                          - 'desktop/**'
                          - 'server/**'
                          - 'Makefile'
                          - '.github/workflows/ci.yml'
                      site:
                          - 'site/**'
                          - '.github/workflows/ci.yml'

    # Linux is the standalone Server deployment target. macOS and Windows run
    # the same complete Server suite below as part of their Desktop App gates,
    # because the App hosts server/app in-process rather than a smaller runtime.
    server-linux:
        name: server linux (make server-test)
        needs: changes
        if: needs.changes.outputs.server == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version-file: server/go.mod
                  cache-dependency-path: server/go.sum

            # CGO deps for govips + libraw (server/internal/utils/raw).
            - name: Install libvips and libraw
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends libvips-dev libraw-dev

            - run: make server-test

    web:
        name: web (make web-test)
        needs: changes
        if: needs.changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v7

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: '24'
                  cache: true

            # @edwinzhancn/docts lives on GitHub Packages, which requires a
            # token even for public packages (web/.npmrc maps the scope).
            - name: Authenticate GitHub Packages
              run: echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> ~/.npmrc
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install dependencies
              run: cd web && vp install --frozen-lockfile

            # Keyed on the lockfile, which changes when the Playwright version
            # does. A hit still needs `install-deps` for the apt libraries the
            # browser links against.
            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

            - name: Install Playwright Chromium
              run: |
                  cd web
                  if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
                      vp exec playwright install-deps chromium
                  else
                      vp exec playwright install --with-deps chromium
                  fi

            - run: make web-test

            # A docker-container builder plus the ACTIONS_* runtime env let the
            # E2E image builds read and write the GitHub Actions layer cache;
            # docker-compose.e2e.ci.yml wires the cache in per service.
            - uses: docker/setup-buildx-action@v3
            - uses: crazy-max/ghaction-github-runtime@v3

            - name: Start isolated E2E environment
              run: cd web && vp run e2e:up
              env:
                  LUMILIO_E2E_COMPOSE_EXTRA: docker-compose.e2e.ci.yml

            - name: Run Chromium smoke
              run: make web-browser-test

            - name: Capture E2E service logs
              if: failure()
              run: |
                  mkdir -p web/test-results
                  cd web
                  vp run e2e:logs > test-results/services.log

            - name: Upload Playwright diagnostics
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-smoke-${{ github.run_id }}
                  path: |
                      web/playwright-report/
                      web/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

            - name: Stop isolated E2E environment
              if: always()
              run: cd web && vp run e2e:down

    # macOS and Windows intentionally validate the same product surface:
    # complete embedded Server tests, complete Desktop tests, and a native CGo
    # build. Only dependency/toolchain setup and platform-specific test files
    # differ between the two jobs.
    desktop-macos:
        name: desktop macos (tests + CGo build)
        needs: changes
        if: needs.changes.outputs.desktop == 'true'
        runs-on: macos-15
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version-file: desktop/go.mod
                  cache-dependency-path: |
                      desktop/go.sum
                      server/go.sum

            # `make desktop-test` builds the Svelte control panel first, which
            # needs `vp`. The panel's dependencies are all public, so it needs
            # no GitHub Packages token, and `desktop-panel` runs `vp install`
            # itself.
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: '24'
                  cache: true

            # CGO deps: both the complete Server suite and the Desktop module
            # compile govips/libraw. PostgreSQL lifecycle tests auto-skip
            # because no PostgreSQL distribution is staged on PR runners.
            - name: Install libvips and libraw
              run: brew install vips libraw

            - name: Run complete embedded Server tests
              run: make server-test

            - name: Run complete Desktop tests
              run: |
                  go clean -cache
                  make desktop-test

            - name: Compile Desktop App
              working-directory: desktop
              run: go build ./...

    # Windows uses the same test/build scope as macOS, but runs Go inside the
    # MSYS2/mingw64 environment that supplies the release CGo toolchain. The
    # control panel stays in the default shell because vp is not on the MSYS2
    # PATH; the generated directory is shared on disk with the later steps.
    #
    # This job depends on an external toolchain (msys2 package availability), so
    # if it starts failing for reasons unrelated to a change, fix or pin the
    # toolchain — do not quietly restore continue-on-error.
    desktop-windows:
        name: desktop windows (tests + CGo build)
        needs: changes
        if: needs.changes.outputs.desktop == 'true'
        runs-on: windows-2025
        env:
            CGO_ENABLED: '1'
            GOFLAGS: -buildvcs=false
            CGO_LDFLAGS_ALLOW: -Xpreprocessor
            CGO_CFLAGS_ALLOW: -Xpreprocessor
        steps:
            - uses: actions/checkout@v7

            - uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: false
                  install: >-
                      git
                      mingw-w64-x86_64-go
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-pkgconf
                      mingw-w64-x86_64-libvips
                      mingw-w64-x86_64-libraw

            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: '24'
                  cache: true

            - name: Build control panel
              run: cd desktop/panel && vp install && vp run build

            - name: Run complete embedded Server tests
              shell: msys2 {0}
              run: |
                  go clean -cache
                  go version
                  pkgconf --modversion vips libraw
                  cd server
                  go test ./...

            - name: Run complete Desktop tests
              shell: msys2 {0}
              run: |
                  cd desktop
                  go test ./...

            - name: Compile Desktop App
              shell: msys2 {0}
              run: |
                  cd desktop
                  go build ./...

    site:
        name: site (vitepress build)
        needs: changes
        if: needs.changes.outputs.site == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            # setup-vp provisions the runtime, the package manager pinned by
            # site/package.json, and install caching, so pnpm needs no separate
            # corepack or setup-node step.
            - uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: '24'
                  cache: true

            - name: Install dependencies
              run: cd site && vp install

            - name: Build docs site
              run: cd site && vp run build
