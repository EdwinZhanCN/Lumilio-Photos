name: Release Docker

# Builds multi-arch (amd64 + arm64) images for the Linux/Docker distribution
# and publishes them to GHCR. Each architecture builds natively (no QEMU) and
# pushes by digest; a merge job then assembles the multi-arch manifest.
#
# Tags: vX.Y.Z tag push → version tags (+ latest for stable releases);
# manual dispatch → `edge` tag for pre-release testing.

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

env:
    IMAGE_BASE: ghcr.io/edwinzhancn

jobs:
    build:
        name: ${{ matrix.image }} (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                image: [server, web, db]
                arch: [amd64, arm64]
                include:
                    - arch: amd64
                      runner: ubuntu-24.04
                    - arch: arm64
                      runner: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v7

            - name: Resolve Dockerfile
              id: df
              run: |
                  case "${{ matrix.image }}" in
                      server) echo "file=server/Dockerfile" >> "$GITHUB_OUTPUT" ;;
                      web)    echo "file=web/Dockerfile" >> "$GITHUB_OUTPUT" ;;
                      db)     echo "file=server/db.Dockerfile" >> "$GITHUB_OUTPUT" ;;
                  esac

            - uses: docker/setup-buildx-action@v4

            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ${{ steps.df.outputs.file }}
                  platforms: linux/${{ matrix.arch }}
                  build-args: |
                      VERSION=${{ github.ref_name }}
                  # Only web/Dockerfile mounts this (GitHub Packages npm auth
                  # for @edwinzhancn/docts); unused by server/db builds.
                  secrets: |
                      npmrc=//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
                  outputs: type=image,name=${{ env.IMAGE_BASE }}/lumilio-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
                  cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

            - name: Export digest
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - uses: actions/upload-artifact@v7
              with:
                  name: digests-${{ matrix.image }}-${{ matrix.arch }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: manifest (${{ matrix.image }})
        runs-on: ubuntu-24.04
        needs: build
        strategy:
            fail-fast: false
            matrix:
                image: [server, web, db]
        steps:
            - name: Download digests
              uses: actions/download-artifact@v8
              with:
                  pattern: digests-${{ matrix.image }}-*
                  path: /tmp/digests
                  merge-multiple: true

            - uses: docker/setup-buildx-action@v4

            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_BASE }}/lumilio-${{ matrix.image }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
                      type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
                      type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

            - name: Create multi-arch manifest
              working-directory: /tmp/digests
              run: |
                  docker buildx imagetools create \
                      $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
                      $(printf '${{ env.IMAGE_BASE }}/lumilio-${{ matrix.image }}@sha256:%s ' *)

            - name: Inspect manifest
              run: docker buildx imagetools inspect "${{ env.IMAGE_BASE }}/lumilio-${{ matrix.image }}:${{ steps.meta.outputs.version }}"
