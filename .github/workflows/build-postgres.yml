name: Build PostgreSQL (desktop bundle)

# Builds a relocatable PostgreSQL 17 + pgvector (+ contrib pg_trgm) for the
# macOS desktop bundle. Run on demand; the resulting artifacts are staged
# into desktop/resources/postgres/17/<platform>/ before packaging.
#
# Search relies on pg_trgm + to_tsvector('simple') only; pg_textsearch (BM25)
# and zhparser/SCWS were removed 2026-07-05 as unused by the server.

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: PostgreSQL version
        default: "17.5"
      pgvector_version:
        description: pgvector version (git tag)
        default: "v0.8.0"
  # Callable from the desktop release workflows so the PG artifacts are built
  # fresh within the same run (artifact retention is short).
  workflow_call:
    inputs:
      pg_version:
        type: string
        default: "17.5"
      pgvector_version:
        type: string
        default: "v0.8.0"

jobs:
  build:
    name: macOS (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15 # Apple Silicon
            platform: darwin-arm64
          - runner: macos-15-intel # Intel
            platform: darwin-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Build PostgreSQL ${{ inputs.pg_version }}
        run: |
          set -euo pipefail
          PGVER="${{ inputs.pg_version }}"
          DIST="$PWD/pg-dist"
          curl -fsSL -O "https://ftp.postgresql.org/pub/source/v${PGVER}/postgresql-${PGVER}.tar.bz2"
          tar xf "postgresql-${PGVER}.tar.bz2"
          cd "postgresql-${PGVER}"
          ./configure \
            --prefix="$DIST" \
            --without-readline \
            --without-zlib \
            --without-icu \
            --without-openssl
          if grep -q '^#define USE_OPENSSL 1' src/include/pg_config.h; then
            echo "PostgreSQL was configured with OpenSSL; the desktop bundle should be OpenSSL-free."
            exit 1
          fi
          make -j"$(sysctl -n hw.ncpu)"
          make install
          make -C contrib/pg_trgm install

      - name: Build pgvector ${{ inputs.pgvector_version }}
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          git clone --branch "${{ inputs.pgvector_version }}" --depth 1 https://github.com/pgvector/pgvector.git
          cd pgvector
          make PG_CONFIG="$DIST/bin/pg_config"
          make PG_CONFIG="$DIST/bin/pg_config" install

      - name: Stage bundle layout
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          OUT="postgres/17/${{ matrix.platform }}"
          mkdir -p "$OUT"
          cp -R "$DIST/bin" "$DIST/lib" "$DIST/share" "$OUT/"
          # Keep only the binaries the supervisor uses to slim the bundle.
          find "$OUT/bin" -maxdepth 1 -type f \
            ! -name postgres ! -name initdb ! -name pg_ctl ! -name pg_isready \
            ! -name createdb ! -name pg_dump ! -name pg_restore ! -name pg_config \
            -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-${{ matrix.platform }}
          path: postgres/
          retention-days: 7

  # Windows bundle: EDB publishes official relocatable binaries (zip), so we
  # only compile pgvector against them (pg_trgm ships in the zip already).
  build-windows:
    name: Windows (windows-amd64)
    runs-on: windows-2025
    steps:
      - name: Download PostgreSQL ${{ inputs.pg_version }} binaries (EDB)
        shell: pwsh
        run: |
          $ver = "${{ inputs.pg_version }}-1"
          $url = "https://get.enterprisedb.com/postgresql/postgresql-$ver-windows-x64-binaries.zip"
          Invoke-WebRequest -Uri $url -OutFile pg.zip
          Expand-Archive pg.zip -DestinationPath .
          # Layout after extraction: .\pgsql\{bin,lib,share,include,...}

      - name: Build pgvector ${{ inputs.pgvector_version }}
        shell: pwsh
        run: |
          git clone --branch "${{ inputs.pgvector_version }}" --depth 1 https://github.com/pgvector/pgvector.git

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Compile pgvector (nmake)
        shell: cmd
        working-directory: pgvector
        run: |
          set "PGROOT=%GITHUB_WORKSPACE%\pgsql"
          nmake /F Makefile.win
          nmake /F Makefile.win install

      - name: Stage bundle layout
        shell: pwsh
        run: |
          $out = "postgres/17/windows-amd64"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item -Recurse pgsql/bin, pgsql/lib, pgsql/share $out
          # Slim: keep only the binaries the supervisor uses (plus the DLLs
          # they load, which live alongside them in bin).
          $keep = @('postgres.exe','initdb.exe','pg_ctl.exe','pg_isready.exe',
                    'createdb.exe','pg_dump.exe','pg_restore.exe','pg_config.exe')
          Get-ChildItem "$out/bin" -File | Where-Object {
              $_.Extension -eq '.exe' -and $keep -notcontains $_.Name
          } | Remove-Item
          # Sanity: pgvector + pg_trgm extensions present.
          if (-not (Test-Path "$out/share/extension/vector.control")) { throw "pgvector missing" }
          if (-not (Test-Path "$out/share/extension/pg_trgm.control")) { throw "pg_trgm missing" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-windows-amd64
          path: postgres/
          retention-days: 7
