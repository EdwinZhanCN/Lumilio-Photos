name: Build PostgreSQL (desktop bundle)

# Builds a relocatable PostgreSQL 17 + pgvector + pg_textsearch + zhparser
# for the macOS desktop bundle. Run on demand; the resulting artifacts are
# staged into desktop/resources/postgres/17/<platform>/ before packaging.

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: PostgreSQL version
        default: "17.5"
      pgvector_version:
        description: pgvector version (git tag)
        default: "v0.8.0"
      pg_textsearch_version:
        description: pg_textsearch version (git tag)
        default: "v1.3.0"
      scws_version:
        description: SCWS version for zhparser
        default: "1.2.3"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15 # Apple Silicon
            platform: darwin-arm64
          - runner: macos-15-intel # Intel
            platform: darwin-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Build PostgreSQL ${{ inputs.pg_version }}
        run: |
          set -euo pipefail
          PGVER="${{ inputs.pg_version }}"
          DIST="$PWD/pg-dist"
          curl -fsSL -O "https://ftp.postgresql.org/pub/source/v${PGVER}/postgresql-${PGVER}.tar.bz2"
          tar xf "postgresql-${PGVER}.tar.bz2"
          cd "postgresql-${PGVER}"
          ./configure \
            --prefix="$DIST" \
            --without-readline \
            --without-zlib \
            --without-icu \
            --without-openssl
          if grep -q '^#define USE_OPENSSL 1' src/include/pg_config.h; then
            echo "PostgreSQL was configured with OpenSSL; the desktop bundle should be OpenSSL-free."
            exit 1
          fi
          make -j"$(sysctl -n hw.ncpu)"
          make install
          make -C contrib/pg_trgm install

      - name: Build pgvector ${{ inputs.pgvector_version }}
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          git clone --branch "${{ inputs.pgvector_version }}" --depth 1 https://github.com/pgvector/pgvector.git
          cd pgvector
          make PG_CONFIG="$DIST/bin/pg_config"
          make PG_CONFIG="$DIST/bin/pg_config" install

      - name: Build pg_textsearch ${{ inputs.pg_textsearch_version }}
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          git clone --branch "${{ inputs.pg_textsearch_version }}" --depth 1 https://github.com/timescale/pg_textsearch.git
          cd pg_textsearch
          make PG_CONFIG="$DIST/bin/pg_config"
          make PG_CONFIG="$DIST/bin/pg_config" install

      - name: Build SCWS + zhparser
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          SCWS_VER="${{ inputs.scws_version }}"
          # Build SCWS (Simple Chinese Word Segmentation)
          curl -fsSL -O "http://www.xunsearch.com/scws/down/scws-${SCWS_VER}.tar.bz2"
          tar xf "scws-${SCWS_VER}.tar.bz2"
          cd "scws-${SCWS_VER}"
          ./configure --prefix="$DIST/scws"
          make -j"$(sysctl -n hw.ncpu)"
          make install
          cd ..
          # Build zhparser
          git clone --depth 1 https://github.com/amutu/zhparser.git
          cd zhparser
          SCWS_HOME="$DIST/scws" make PG_CONFIG="$DIST/bin/pg_config"
          SCWS_HOME="$DIST/scws" make PG_CONFIG="$DIST/bin/pg_config" install
          # Copy SCWS dictionary into PG share for runtime access
          mkdir -p "$DIST/share/postgresql/tsearch_data"
          cp -R "$DIST/scws/etc/"* "$DIST/share/postgresql/tsearch_data/" 2>/dev/null || true
          cp -R "$DIST/scws/share/scws/"* "$DIST/share/postgresql/tsearch_data/" 2>/dev/null || true

      - name: Stage bundle layout
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          OUT="postgres/17/${{ matrix.platform }}"
          mkdir -p "$OUT"
          cp -R "$DIST/bin" "$DIST/lib" "$DIST/share" "$OUT/"
          # Copy SCWS shared libs alongside PG libs for runtime linking
          cp -R "$DIST/scws/lib/"*.dylib "$OUT/lib/" 2>/dev/null || true
          # Keep only the binaries the supervisor uses to slim the bundle.
          find "$OUT/bin" -maxdepth 1 -type f \
            ! -name postgres ! -name initdb ! -name pg_ctl ! -name pg_isready \
            ! -name createdb ! -name pg_dump ! -name pg_restore ! -name pg_config \
            -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-${{ matrix.platform }}
          path: postgres/
          retention-days: 7
