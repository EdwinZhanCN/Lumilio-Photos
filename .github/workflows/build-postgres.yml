name: Build PostgreSQL (desktop bundle)

# Builds a relocatable PostgreSQL 16 + pgvector for the macOS desktop bundle.
# Run on demand; the resulting artifacts are staged into
# desktop/resources/postgres/16/<platform>/ before packaging the .app.

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: PostgreSQL version
        default: "16.9"
      pgvector_version:
        description: pgvector version (git tag)
        default: "v0.8.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15 # Apple Silicon
            platform: darwin-arm64
          - runner: macos-15-intel # Intel
            platform: darwin-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Build PostgreSQL ${{ inputs.pg_version }}
        run: |
          set -euo pipefail
          PGVER="${{ inputs.pg_version }}"
          DIST="$PWD/pg-dist"
          curl -fsSL -O "https://ftp.postgresql.org/pub/source/v${PGVER}/postgresql-${PGVER}.tar.bz2"
          tar xf "postgresql-${PGVER}.tar.bz2"
          cd "postgresql-${PGVER}"
          # ICU/OpenSSL are omitted to keep the tree relocatable and small. The
          # desktop cluster is socket-only and created with --locale=C, so it
          # does not need TLS or ICU-linked collations.
          ./configure \
            --prefix="$DIST" \
            --without-readline \
            --without-zlib \
            --without-icu \
            --without-openssl
          if grep -q '^#define USE_OPENSSL 1' src/include/pg_config.h; then
            echo "PostgreSQL was configured with OpenSSL; the desktop bundle should be OpenSSL-free."
            exit 1
          fi
          make -j"$(sysctl -n hw.ncpu)"
          make install
          # Contrib extensions the schema requires (core `make install` omits
          # contrib): pgcrypto (CREATE EXTENSION pgcrypto in the first migration)
          # and pg_trgm (trigram filename search). Build only these two to avoid
          # contrib modules that need extra deps. pgcrypto builds without
          # OpenSSL using its internal implementations when configured above.
          make -C contrib/pgcrypto install
          make -C contrib/pg_trgm install

      - name: Build pgvector ${{ inputs.pgvector_version }}
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          git clone --branch "${{ inputs.pgvector_version }}" --depth 1 https://github.com/pgvector/pgvector.git
          cd pgvector
          make PG_CONFIG="$DIST/bin/pg_config"
          make PG_CONFIG="$DIST/bin/pg_config" install

      - name: Stage bundle layout
        run: |
          set -euo pipefail
          DIST="$PWD/pg-dist"
          OUT="postgres/16/${{ matrix.platform }}"
          mkdir -p "$OUT"
          cp -R "$DIST/bin" "$DIST/lib" "$DIST/share" "$OUT/"
          # Keep only the binaries the supervisor uses to slim the bundle.
          find "$OUT/bin" -maxdepth 1 -type f \
            ! -name postgres ! -name initdb ! -name pg_ctl ! -name pg_isready \
            ! -name createdb ! -name pg_dump ! -name pg_restore ! -name pg_config \
            -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-${{ matrix.platform }}
          path: postgres/
          retention-days: 7
