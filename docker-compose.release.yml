# Lumilio Photos — production compose using published GHCR images.
#
#   LUMILIO_STORAGE=/srv/photos docker compose -f docker-compose.release.yml up -d
#
# Pin a version with LUMILIO_VERSION=v1.0.0 (default: latest).
#
# The image consumes its complete /app/config/server.toml manifest. To change
# immutable policy (including Lumen discovery), mount another complete schema v1
# manifest at that path; environment variables do not override it.

services:
    db:
        image: ghcr.io/edwinzhancn/lumilio-db:${LUMILIO_VERSION:-latest}
        restart: unless-stopped
        environment:
            POSTGRES_DB: lumiliophotos
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD_FILE: /run/secrets/db_bootstrap_password
        secrets:
            - db_bootstrap_password
        volumes:
            - db_data:/var/lib/postgresql
        command:
            - postgres
            - -c
            - maintenance_work_mem=256MB
            - -c
            - max_parallel_maintenance_workers=4
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d lumiliophotos"]
            interval: 10s
            timeout: 5s
            retries: 5

    server:
        image: ghcr.io/edwinzhancn/lumilio-server:${LUMILIO_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        secrets:
            - db_bootstrap_password
        # Uncomment for hardware-accelerated transcoding (Intel/AMD GPU):
        # devices:
        #     - /dev/dri:/dev/dri
        volumes:
            - ${LUMILIO_STORAGE:?set LUMILIO_STORAGE to your media root directory}:/data/storage
        ports:
            - "6680:6680"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:6680/api/v1/health >/dev/null"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s

    web:
        image: ghcr.io/edwinzhancn/lumilio-web:${LUMILIO_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            server:
                condition: service_healthy
        environment:
            LUMILIO_SITE_ADDRESS: ${LUMILIO_SITE_ADDRESS:-:80}
            LUMILIO_API_UPSTREAM: ${LUMILIO_API_UPSTREAM:-http://server:6680}
        ports:
            - "${WEB_HTTP_PORT:-6657}:80"
            - "${WEB_HTTPS_PORT:-6658}:443"
            - "${WEB_HTTPS_PORT:-6658}:443/udp"

volumes:
    db_data:

secrets:
    db_bootstrap_password:
        file: ${LUMILIO_BOOTSTRAP_PASSWORD_FILE:?set LUMILIO_BOOTSTRAP_PASSWORD_FILE to a non-empty 0600 secret file}
